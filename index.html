<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>חיפוש ספריות פ"ת</title>
    <style>
        body { font-family: system-ui, sans-serif; background-color: #f8f9fa; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .card { background: white; padding: 30px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        h2 { margin-bottom: 25px; color: #1a73e8; font-size: 24px; }
        .input-group { position: relative; margin-bottom: 20px; }
        input { width: 100%; padding: 15px; border: 2px solid #dfe1e5; border-radius: 12px; font-size: 18px; box-sizing: border-box; outline: none; transition: border-color 0.3s; }
        input:focus { border-color: #1a73e8; }
        .mic-btn { background: #ea4335; color: white; border: none; border-radius: 50%; width: 70px; height: 70px; font-size: 30px; cursor: pointer; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(234,67,53,0.3); }
        .mic-btn.listening { animation: pulse 1.5s infinite; background: #c5221f; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        #status { margin-top: 15px; font-weight: bold; min-height: 24px; color: #5f6368; }
        .search-btn { background: #1a73e8; color: white; border: none; padding: 12px 24px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; width: 100%; }
    </style>
</head>
<body>

<div class="card">
    <h2>ספריות פתח תקווה</h2>
    
    <button type="button" class="mic-btn" id="micBtn">🎤</button>
    
    <div class="input-group">
        <input type="text" id="bookInput" placeholder="איזה ספר לחפש?">
    </div>
    
    <button type="button" class="search-btn" id="searchBtn">חפש עותקים 📚</button>
    
    <div id="status">לחץ על המיקרופון ודבר</div>
</div>

<form id="fallbackForm" action="https://ptikva.libraries.co.il//BuildaGate5library/general2/company_search_tree.php" method="POST" target="_blank" style="display:none;">
    <input type="hidden" name="NewNameMade" value="30213">
    <input type="hidden" name="SiteName" value="LIB_ptikva">
    <input type="hidden" name="SearchType" value="Card1">
    <input type="hidden" name="SearchFildType_1" value="DataCardName~DataCardField_1">
    <input type="hidden" name="FreeText_1" id="fallbackInput">
</form>

<script>
    var bookInput = document.getElementById('bookInput');
    var statusDiv = document.getElementById('status');
    var micBtn = document.getElementById('micBtn');

    function runSearch() {
        var bookName = bookInput.value.trim();
        if (!bookName) return;

        statusDiv.innerText = "מנסה דילוג ישיר לסניפים...";
        
        // נסיון מהיר למצוא את ה-ID דרך פרוקסי
        var xhr = new XMLHttpRequest();
        var targetUrl = 'https://ptikva.libraries.co.il//BuildaGate5library/general2/company_search_tree.php';
        var proxyUrl = 'https://corsproxy.io/?' + encodeURIComponent(targetUrl);

        xhr.open('POST', proxyUrl, true);
        xhr.setRequestHeader('Content-Type', 'application/x-www-form-urlencoded');
        xhr.timeout = 2500; // אם תוך 2.5 שניות אין תשובה (בגלל חסימת פרוקסי), עוברים לגיבוי

        xhr.onload = function() {
            var match = xhr.responseText.match(/date_card_popup\('(\d+)'/);
            if (match && match[1]) {
                // הצלחה! עוברים ישר לדף הסניפים
                window.location.href = "https://ptikva.libraries.co.il//BuildaGate5library/general2/product_card_edit.php?SiteName=LIB_ptikva&NewNameMade=30213&ItemID=" + match[1] + "&Card=Card1&WhatToWorkOn=List";
            } else {
                submitFallback(bookName);
            }
        };

        xhr.onerror = function() { submitFallback(bookName); };
        xhr.ontimeout = function() { submitFallback(bookName); };
        
        var payload = "NewNameMade=30213&SiteName=LIB_ptikva&SearchType=Card1&FreeText_1=" + encodeURIComponent(bookName);
        xhr.send(payload);
    }

    function submitFallback(name) {
        statusDiv.innerText = "מעביר לחיפוש רגיל...";
        document.getElementById('fallbackInput').value = name;
        document.getElementById('fallbackForm').submit();
    }

    function startDictation() {
        var Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!Speech) { alert("הדפדפן לא תומך במיקרופון."); return; }
        
        var recognition = new Speech();
        recognition.lang = "he-IL";
        
        recognition.onstart = function() {
            micBtn.classList.add('listening');
            statusDiv.innerText = "מקשיב...";
        };
        
        recognition.onresult = function(event) {
            micBtn.classList.remove('listening');
            var text = event.results[0][0].transcript;
            bookInput.value = text;
            runSearch(); // חיפוש אוטומטי מיד אחרי הדיבור
        };
        
        recognition.onerror = function() {
            micBtn.classList.remove('listening');
            statusDiv.innerText = "שגיאת מיקרופון. נסה שוב.";
        };

        recognition.start();
    }

    document.getElementById('searchBtn').onclick = runSearch;
    micBtn.onclick = startDictation;

    // הפעלת חיפוש בלחיצה על Enter
    bookInput.onkeypress = function(e) { if(e.which == 13) runSearch(); };
</script>
</body>
</html>
