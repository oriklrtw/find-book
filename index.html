<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>חיפוש ספריות פ"ת</title>
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; background: #f0f2f5; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 40px 20px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 90%; max-width: 400px; text-align: center; }
        h2 { color: #1a73e8; font-size: 28px; margin-bottom: 30px; }
        .mic-btn { background: #ea4335; color: white; border: none; border-radius: 50%; width: 100px; height: 100px; font-size: 45px; cursor: pointer; box-shadow: 0 8px 20px rgba(234,67,53,0.3); transition: 0.3s; -webkit-tap-highlight-color: transparent; margin-bottom: 20px; }
        .mic-btn:active { transform: scale(0.9); background: #c5221f; }
        .listening { animation: pulse 1.5s infinite; background: #c5221f; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(234,67,53, 0.7); } 70% { box-shadow: 0 0 0 20px rgba(234,67,53, 0); } 100% { box-shadow: 0 0 0 0 rgba(234,67,53, 0); } }
        input[type="text"] { width: 100%; padding: 15px; border: 2px solid #ddd; border-radius: 12px; font-size: 18px; margin-bottom: 15px; box-sizing: border-box; text-align: center; outline: none; }
        .search-btn { background: #34a853; color: white; border: none; padding: 15px; border-radius: 12px; width: 100%; font-size: 18px; font-weight: bold; cursor: pointer; }
        #status { margin-top: 15px; font-size: 16px; font-weight: bold; color: #5f6368; }
    </style>
</head>
<body>

<div class="card">
    <h2>חיפוש ספריה מהיר</h2>
    
    <button type="button" class="mic-btn" id="micBtn">🎤</button>
    
    <form id="searchForm" action="https://ptikva.libraries.co.il//BuildaGate5library/general2/company_search_tree.php" method="POST">
        <input type="hidden" name="NewNameMade" value="30213">
        <input type="hidden" name="SiteName" value="LIB_ptikva">
        <input type="hidden" name="SearchType" value="Card1">
        <input type="hidden" name="SearchFildType_1" value="DataCardName~DataCardField_1">
        
        <input type="text" name="FreeText_1" id="bookInput" placeholder="שם הספר לחיפוש...">
        <button type="submit" class="search-btn">חפש בספריה 🔍</button>
    </form>
    
    <div id="status">לחצי על המיקרופון ודברי</div>
</div>

<script>
    var micBtn = document.getElementById('micBtn');
    var statusDiv = document.getElementById('status');
    var bookInput = document.getElementById('bookInput');
    var searchForm = document.getElementById('searchForm');

    function startDictation() {
        var Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!Speech) {
            alert("הדפדפן לא תומך במיקרופון. מומלץ להשתמש בכרום.");
            return;
        }
        
        var recognition = new Speech();
        recognition.lang = "he-IL";
        
        recognition.onstart = function() {
            micBtn.classList.add('listening');
            statusDiv.innerText = "מקשיב...";
        };
        
        recognition.onresult = function(event) {
            micBtn.classList.remove('listening');
            var text = event.results[0][0].transcript;
            bookInput.value = text;
            statusDiv.innerText = "מחפש: " + text;
            
            // שולח אוטומטית חצי שנייה אחרי הזיהוי
            setTimeout(function() { searchForm.submit(); }, 500);
        };
        
        recognition.onerror = function() {
            micBtn.classList.remove('listening');
            statusDiv.innerText = "לא שמעתי, נסי שוב";
        };

        recognition.start();
    }

    micBtn.onclick = startDictation;
</script>
</body>
</html>
